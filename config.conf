# 视频目录（可使用绝对路径或相对脚本目录的路径）
VIDEO_DIR=./videos

# 输出目录（每个视频会创建独立子目录）
OUTPUT_DIR=./output

# 抽帧间隔：至少间隔多少帧再保存下一张关键帧
FRAME_INTERVAL=1800

# 是否在抽帧后上传图片到服务器：1=上传，0=不上传
UPLOAD_ENABLED=1

# 服务器 SSH 信息
SSH_HOST=example.com
SSH_PORT=22
SSH_USER=root

# 远程图片根目录
REMOTE_DIR=/data/ffmpeg_frames

# SSH 私钥路径，留空则使用默认 SSH 配置
SSH_KEY=
